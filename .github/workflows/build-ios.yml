name: Build iOS IPA

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EAS
        run: |
          eas --version
          node --version
          npm --version

      - name: Build iOS IPA locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --local \
            --platform ios \
            --profile development \
            --non-interactive

      - name: Find IPA
        run: |
          find . -name "*.ipa" -o -name "*.app"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            **/*.ipa
            **/*.app
          retention-days: 30
          if-no-files-found: error
