name: Build iOS IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Expo CLI
      run: |
        npm install -g @expo/cli
        expo --version
        
    - name: Install dependencies
      run: |
        npm ci
        
    - name: Setup EAS CLI
      run: |
        npm install -g eas-cli
        eas --version
        
    - name: Authenticate with Expo
      run: |
        echo "${{ secrets.EXPO_TOKEN }}" | eas login --non-interactive
        
    - name: Configure EAS
      run: |
        eas project:info
        
    - name: Build iOS IPA (Development)
      if: github.event.inputs.build_type == 'development' || github.event.inputs.build_type == ''
      run: |
        eas build --platform ios --profile development --non-interactive
        
    - name: Build iOS IPA (Production)
      if: github.event.inputs.build_type == 'production'
      run: |
        eas build --platform ios --profile production --non-interactive
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-${{ github.event.inputs.build_type || 'development' }}
        path: "*.ipa"
        retention-days: 30
        
    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs-${{ github.event.inputs.build_type || 'development' }}
        path: |
          eas-build.log
          *.log
        retention-days: 7

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Build Status
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#builds'
        text: |
          iOS Build ${{ job.status == 'success' && '✅ Successful' || '❌ Failed' }}
          
          📱 App: MediaPlayer
          🔄 Branch: ${{ github.ref_name }}
          🏷️ Build: ${{ github.event.inputs.build_type || 'development' }}
          👤 By: ${{ github.actor }}
          
          ${{ job.status == 'success' && '📦 IPA available in Artifacts' || '' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
